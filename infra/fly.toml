# Fly.io configuration for the Mira Agent Worker.
# Region: YYZ (Toronto) for Canadian data residency.
# Deploys from apps/worker/Dockerfile via `fly deploy --config infra/fly.toml`.

app = "mira-worker"
primary_region = "yyz"

[build]
  dockerfile = "../apps/worker/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "off"   # workers must stay warm to consume the queue
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[deploy]
  strategy = "rolling"

[checks.health]
  type = "http"
  port = 4000
  path = "/health"
  interval = "30s"
  timeout = "10s"
  grace_period = "30s"
