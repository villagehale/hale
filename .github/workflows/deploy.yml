# Deployment pipeline — runs ONLY after the CI workflow ("CI") succeeds on main.
# Keeps deploy concerns out of ci.yml (CI gates correctness; this gates release).
#
# TWO independent legs, each gated on ITS secret being present:
#   - migrate : DB migrations against Supabase Toronto     (needs DATABASE_DIRECT_URL)
#   - fly     : apps/worker to Fly.io yyz                  (needs FLY_API_TOKEN)
#
# VERCEL IS NOT DEPLOYED HERE. Both `site` (marketing) and `hale-web` (the app)
# are GitHub-connected Vercel projects that auto-deploy on main pushes via the
# native Vercel integration — verified 2026-07-05: vercel[bot] creates the
# Production deployment on every main merge. The old CLI-based `vercel` leg here
# was a redundant SECOND prod deploy that failed on a stale VERCEL_TOKEN, so
# every Deploy run went red for a step that did nothing; removed 2026-07-05.
# (Manual redeploy if ever needed: `vercel deploy --prod` with a valid token.)
#
# GATING CONTRACT (see preflight job):
#   - A leg whose secret is ABSENT is SKIPPED with a notice — the pipeline stays
#     green so a partially-credentialled environment can still deploy what it can.
#   - A leg that DOES run but finds its required secret empty FAILS LOUD (the
#     in-step assertion `exit 1`) — we never silently deploy without auth.
#
# ORDER: migrate runs first (schema must exist before the worker hits it), then
# fly deploys. A failed migration blocks the worker deploy.
#
# ROLLBACK (manual — see docs/deploy/README.md for full procedure):
#   - Vercel : `vercel promote <previous-prod-url> --token=$VERCEL_TOKEN`
#   - Fly    : `fly releases --app hale-worker` then `fly deploy --image <prev>`
#              or `fly releases rollback <version> --app hale-worker`
#   - DB     : migrations are additive (CLAUDE.md #9) — no auto down-migration;
#              restore from Supabase PITR if a migration is bad.

name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Gate the whole pipeline on CI success, and resolve which legs have secrets.
  # Secrets can't be read in job-level `if:`, so we map presence to outputs here.
  preflight:
    name: Preflight (CI gate + secret presence)
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      has_db: ${{ steps.check.outputs.has_db }}
      has_fly: ${{ steps.check.outputs.has_fly }}
    steps:
      - id: check
        env:
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          db=false; fly=false
          [ -n "$DATABASE_DIRECT_URL" ] && db=true || echo "::notice::DATABASE_DIRECT_URL absent — DB migration leg will be SKIPPED."
          [ -n "$FLY_API_TOKEN" ] && fly=true || echo "::notice::FLY_API_TOKEN absent — Fly worker leg will be SKIPPED."
          {
            echo "has_db=$db"
            echo "has_fly=$fly"
          } >> "$GITHUB_OUTPUT"

  # ── DB migrations → Supabase Toronto ──────────────────────────────────────
  migrate:
    name: DB migrate (Supabase yyz)
    needs: preflight
    if: needs.preflight.outputs.has_db == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # drizzle.config.ts reads ./dist/schema/index.js — must build @hale/db first.
      - run: pnpm --filter @hale/db build
      - name: Apply migrations
        env:
          # Use the DIRECT (non-pooled) URL for migrations — drizzle-kit runs DDL
          # in a transaction, which PgBouncer transaction-pooling can't hold.
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_DIRECT_URL:-}" ]; then
            echo "::error::migrate leg ran without DATABASE_DIRECT_URL — refusing to proceed."; exit 1
          fi
          pnpm --filter @hale/db migrate

  # ── Worker → Fly.io Toronto (yyz) ─────────────────────────────────────────
  fly:
    name: Fly deploy (hale-worker yyz)
    needs: [preflight, migrate]
    if: |
      always() &&
      needs.preflight.outputs.has_fly == 'true' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4
      # Pinned to commit SHA (ed8efb3 = master @ 2026-06) for supply-chain safety.
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1
      - name: Deploy worker to Fly (yyz)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::error::Fly leg ran without FLY_API_TOKEN — refusing to proceed."; exit 1
          fi
          # --remote-only builds on Fly's builders (no local Docker in CI).
          # App secrets (DATABASE_URL, ANTHROPIC_API_KEY, LANGFUSE_*, RESEND_*)
          # are set out-of-band via `fly secrets set` — see docs/deploy/README.md.
          flyctl deploy --config infra/fly.toml --remote-only
