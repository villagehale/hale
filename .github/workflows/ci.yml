name: CI

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Prompt lockfile check
        run: pnpm --filter @hale/worker prompts:check

      - name: Classifier eval (cached-only)
        run: pnpm --filter @hale/worker eval:classifier

      - name: Drafter eval (cached-only)
        run: pnpm --filter @hale/worker eval:drafter

      - name: Memory inferencer eval (cached-only)
        run: pnpm --filter @hale/worker eval:memory

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          DATABASE_DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
